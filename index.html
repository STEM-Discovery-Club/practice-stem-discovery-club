<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STEM Discovery Club | Inspiring Young Minds</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
  --pink: #FFB3C6;
  --pink-light: #FFD6E0;
  --pink-dark: #E87D9A;
  --yellow: #FFE566;
  --yellow-light:#FFF3A0;
  --yellow-dark: #F5C400;
  --mint: #B5EAD7;
  --mint-light: #D4F5E9;
  --mint-dark: #5CC8A0;
  --sky: #AED9F7;
  --sky-light: #D6EEFF;
  --sky-dark: #5AABDF;
  --lavender: #C3B1E1;
  --lavender-light:#E5DEFF;
  --peach: #FFCBA4;
  --peach-light: #FFE8D6;
  --coral: #FF8C69;
  --white: #FFFDF7;
  --dark: #2D2A45;
  --dark2: #4A4470;
  --gray: #7B7A99;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-pill: 50px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
  font-family: 'Nunito', sans-serif;
  background: var(--sky-light);
  color: var(--dark);
  line-height: 1.65;
  overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,253,247,0.95);
  backdrop-filter: blur(14px);
  border-bottom: 3px solid var(--pink-light);
  padding: 0 5vw;
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
  }
  .nav-logo {
  font-family: 'Fredoka One', cursive;
  font-size: 1.25rem;
  color: var(--dark);
  text-decoration: none;
  display: flex; align-items: center; gap: 12px;
  letter-spacing: 0.02em;
  }
  .logo-bubble {
  width: 42px; height: 42px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--yellow) 0%, var(--pink) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  box-shadow: 0 4px 0 var(--yellow-dark);
  border: 2px dashed rgba(255,255,255,0.6);
  flex-shrink: 0;
  }
  .nav-links { display: flex; gap: 1.8rem; list-style: none; align-items: center; }
  .nav-links a {
  text-decoration: none; color: var(--dark2); font-size: 0.92rem; font-weight: 800;
  font-family: 'Baloo 2', cursive;
  transition: color .2s; letter-spacing: 0.01em;
  }
  .nav-links a:hover { color: var(--pink-dark); }
  .nav-links .btn-donate {
  background: var(--pink); color: var(--dark);
  padding: 9px 22px; border-radius: var(--radius-pill); font-weight: 800;
  border: 2.5px solid var(--pink-dark);
  box-shadow: 0 4px 0 var(--pink-dark);
  transition: transform .15s, box-shadow .15s;
  }
  .nav-links .btn-donate:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 var(--pink-dark);
  background: var(--yellow);
  border-color: var(--yellow-dark);
  }

  /* ===== MOBILE NAV ===== */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: 10px;
    border: 2px solid var(--pink-light);
    background: transparent;
    transition: background .2s;
    z-index: 200;
  }
  .hamburger:hover { background: var(--pink-light); }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2.5px;
    border-radius: 2px;
    background: var(--dark);
    transition: transform .3s, opacity .3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 68px;
    left: 0;
    right: 0;
    background: rgba(255,253,247,0.99);
    backdrop-filter: blur(18px);
    border-bottom: 3px solid var(--pink-light);
    padding: 20px 5vw 28px;
    z-index: 99;
    flex-direction: column;
    gap: 6px;
    box-shadow: 0 8px 32px rgba(45,42,69,0.12);
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    text-decoration: none;
    color: var(--dark2);
    font-size: 1.05rem;
    font-weight: 800;
    font-family: 'Baloo 2', cursive;
    padding: 12px 16px;
    border-radius: 12px;
    transition: background .2s, color .2s;
  }
  .mobile-menu a:hover { background: var(--pink-light); color: var(--pink-dark); }
  .mobile-menu a.active { color: var(--pink-dark); background: var(--pink-light); }
  .mobile-menu .btn-donate-mobile {
    background: var(--pink);
    color: var(--dark);
    border: 2.5px solid var(--pink-dark);
    box-shadow: 0 4px 0 var(--pink-dark);
    text-align: center;
    margin-top: 6px;
    border-radius: var(--radius-pill);
  }
  .mobile-menu .btn-donate-mobile:hover { background: var(--yellow); border-color: var(--yellow-dark); box-shadow: 0 4px 0 var(--yellow-dark); }

  @media(max-width: 768px) {
    .hamburger { display: flex; }
    .nav-links { display: none !important; }
  }

  /* ===== ANIMATIONS ===== */
  @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
  @keyframes bounce-slow { 0%, 100% { transform: translateY(0px) rotate(-2deg); } 50% { transform: translateY(-12px) rotate(2deg); } }
  @keyframes shimmer { to { left: 160%; } }

  /* ===== IMAGE PLACEHOLDERS ===== */
  .img-ph {
  border: 3px dashed rgba(100,80,180,0.3);
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--yellow-light) 0%, var(--mint-light) 50%, var(--pink-light) 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; cursor: default;
  position: relative; overflow: hidden;
  transition: border-color .25s, transform .25s;
  }
  .img-ph:hover { border-color: var(--lavender); transform: translateY(-4px) rotate(1deg); }
  .img-ph-icon { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
  .img-ph-label { font-size: 0.8rem; font-weight: 800; color: var(--dark2); text-align: center; padding: 0 16px; font-family: 'Baloo 2', cursive; letter-spacing: .04em; }
  .img-ph-sub { font-size: 0.72rem; color: var(--gray); font-weight: 600; text-align: center; padding: 0 16px; }
  .img-ph::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent); animation: shimmer 2.8s infinite; }

  /* floating hero cards */
  .hero-img-float { position: absolute; z-index: 0; box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 16px 32px rgba(80,60,160,0.12); animation: float 4s ease-in-out infinite; border: 3px solid #fff; pointer-events: none; }
  .hero-img-float.f1 { top: 16%; right: 5%; width: 210px; height: 155px; animation-delay: 0s; transform: rotate(3deg); }
  .hero-img-float.f2 { bottom: 18%; right: 11%; width: 170px; height: 130px; animation-delay: 1.4s; transform: rotate(-4deg); }
  .hero-img-float.f3 { top: 20%; left: 4%; width: 180px; height: 140px; animation-delay: 0.7s; transform: rotate(-2deg); }
  @media(max-width: 900px) { .hero-img-float { display: none; } }

  /* ===== HERO ===== */
  .hero {
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center;
  padding: 130px 5vw 90px;
  position: relative; overflow: hidden;
  background: var(--sky-light);
  }
  .hero::before { content: ''; position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(circle, rgba(180,160,240,0.18) 2px, transparent 2px); background-size: 32px 32px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--yellow); color: var(--dark); border: 2.5px solid var(--yellow-dark); padding: 7px 20px; border-radius: var(--radius-pill); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1.8rem; font-family: 'Baloo 2', cursive; box-shadow: 0 4px 0 var(--yellow-dark); position: relative; z-index: 1; }
  .hero h1 { font-family: 'Fredoka One', cursive; font-size: clamp(2rem, 5vw, 3.8rem); line-height: 1.1; color: var(--dark); max-width: 860px; margin: 0 auto 1.5rem; letter-spacing: 0.01em; position: relative; z-index: 1; }
  .hero h1 em { font-style: normal; color: var(--pink-dark); }
  .hero h1 span.sky-word { color: var(--sky-dark); }
  .hero p { font-size: 1.15rem; color: var(--dark2); max-width: 560px; margin: 0 auto 2.8rem; font-weight: 700; position: relative; z-index: 1; }
  .hero-btns { display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center; position: relative; z-index: 2; }
  .btn-primary { background: var(--mint); color: var(--dark); padding: 14px 32px; border-radius: var(--radius-pill); font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1rem; text-decoration: none; display: inline-block; border: 2.5px solid var(--mint-dark); box-shadow: 0 5px 0 var(--mint-dark); transition: transform .15s, box-shadow .15s; letter-spacing: 0.02em; }
  .btn-primary:hover { transform: translateY(-3px); background: var(--yellow); border-color: var(--yellow-dark); box-shadow: 0 8px 0 var(--yellow-dark); }
  .btn-outline { background: #fff; color: var(--dark); padding: 14px 32px; border-radius: var(--radius-pill); font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1rem; border: 2.5px solid var(--lavender); box-shadow: 0 5px 0 var(--lavender); text-decoration: none; display: inline-block; transition: transform .15s, box-shadow .15s; }
  .btn-outline:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--lavender); }

  .hero-stats { display: flex; gap: 2.5rem; margin-top: 4rem; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; }
  .stat { background: #fff; border-radius: 18px; padding: 18px 28px; text-align: center; border: 2.5px solid var(--pink-light); box-shadow: 0 5px 0 var(--pink-light); transition: transform .2s; }
  .stat:hover { transform: translateY(-4px) rotate(-1deg); }
  .stat:nth-child(2) { border-color: var(--mint); box-shadow: 0 5px 0 var(--mint-dark); }
  .stat:nth-child(3) { border-color: var(--yellow); box-shadow: 0 5px 0 var(--yellow-dark); }
  .stat:nth-child(4) { border-color: var(--sky); box-shadow: 0 5px 0 var(--sky-dark); }
  .stat-num { font-family: 'Fredoka One', cursive; font-size: 2.6rem; color: var(--dark); line-height: 1; }
  .stat-label { font-size: 0.82rem; color: var(--gray); font-weight: 800; margin-top: 4px; font-family: 'Baloo 2', cursive; }

  .deco-float { position: absolute; z-index: 0; pointer-events: none; font-size: 2.5rem; animation: float 5s ease-in-out infinite; user-select: none; }
  .deco-float.d1 { top: 12%; left: 2%; font-size: 2.2rem; animation-delay: 0s; }
  .deco-float.d2 { top: 70%; left: 8%; font-size: 1.8rem; animation-delay: 1s; }
  .deco-float.d3 { top: 25%; right: 2%; font-size: 2rem; animation-delay: 2s; }
  .deco-float.d4 { bottom: 15%; right: 6%; font-size: 2.5rem; animation-delay: 0.5s; }
  .deco-float.d5 { top: 80%; left: 50%; font-size: 1.6rem; animation-delay: 1.5s; }

  /* ===== SECTIONS ===== */
  section { padding: 100px 5vw; }
  .section-label { font-size: 0.78rem; font-weight: 900; text-transform: uppercase; letter-spacing: .14em; color: var(--pink-dark); margin-bottom: 0.5rem; font-family: 'Baloo 2', cursive; }
  .section-title { font-family: 'Fredoka One', cursive; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.15; color: var(--dark); margin-bottom: 1.2rem; letter-spacing: 0.01em; }
  .section-desc { font-size: 1rem; color: var(--dark2); max-width: 560px; font-weight: 700; }

  .wave-divider { width: 100%; overflow: hidden; line-height: 0; }
  .wave-divider svg { display: block; width: 100%; }

  /* ===== ABOUT ===== */
  .about { background: var(--white); position: relative; }
  .about::before { content: ''; position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(circle, rgba(255,179,198,0.12) 2px, transparent 2px); background-size: 28px 28px; }
  .about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .about-visual { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .about-card { background: #fff; border-radius: var(--radius); padding: 26px; border: 2.5px solid var(--mint-light); box-shadow: 0 6px 0 var(--mint); transition: transform .2s; }
  .about-card:hover { transform: translateY(-5px) rotate(-1deg); }
  .about-card.accent { background: var(--lavender-light); border-color: var(--lavender); box-shadow: 0 6px 0 var(--lavender); grid-column: span 2; }
  .about-card.peach-card { background: var(--peach-light); border-color: var(--peach); box-shadow: 0 6px 0 var(--coral); }
  .about-card.sky-card { background: var(--sky-light); border-color: var(--sky); box-shadow: 0 6px 0 var(--sky-dark); }
  .about-card-icon { font-size: 2rem; margin-bottom: 10px; }
  .about-card-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--dark); margin-bottom: 6px; }
  .about-card p { font-size: 0.88rem; color: var(--dark2); font-weight: 600; }

  /* ===== PROGRAMS ===== */
  .programs { background: var(--mint-light); position: relative; }
  .programs::before { content: ''; position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(circle, rgba(100,180,150,0.15) 2px, transparent 2px); background-size: 36px 36px; }
  .programs-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .programs-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 52px; flex-wrap: wrap; gap: 1rem; }
  .programs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; }
  .program-card { background: #fff; border-radius: var(--radius); padding: 0; border: 2.5px solid var(--pink); box-shadow: 0 6px 0 var(--pink-dark); transition: transform .2s, box-shadow .2s; overflow: hidden; }
  .program-card:hover { transform: translateY(-6px) rotate(-1deg); box-shadow: 0 10px 0 var(--pink-dark); }
  .program-card:nth-child(2) { border-color: var(--sky); box-shadow: 0 6px 0 var(--sky-dark); }
  .program-card:nth-child(2):hover { box-shadow: 0 10px 0 var(--sky-dark); }
  .program-card:nth-child(3) { border-color: var(--yellow); box-shadow: 0 6px 0 var(--yellow-dark); }
  .program-card:nth-child(3):hover { box-shadow: 0 10px 0 var(--yellow-dark); }
  .program-card:nth-child(4) { border-color: var(--lavender); box-shadow: 0 6px 0 #9980CC; }
  .program-card:nth-child(4):hover { box-shadow: 0 10px 0 #9980CC; }
  .program-card-body { padding: 24px 26px 28px; }
  .program-icon-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .program-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: var(--pink-light); border: 2px solid var(--pink); }
  .program-card:nth-child(2) .program-icon { background: var(--sky-light); border-color: var(--sky); }
  .program-card:nth-child(3) .program-icon { background: var(--yellow-light); border-color: var(--yellow); }
  .program-card:nth-child(4) .program-icon { background: var(--lavender-light); border-color: var(--lavender); }
  .program-card h3 { font-family: 'Fredoka One', cursive; font-size: 1.15rem; color: var(--dark); margin-bottom: 8px; }
  .program-card p { font-size: 0.88rem; color: var(--dark2); font-weight: 600; }

  /* ===== EVENTS ===== */
  .events { background: var(--dark); position: relative; overflow: hidden; }
  .events::before { content: ''; position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.04) 2px, transparent 2px); background-size: 30px 30px; }
  .events .section-label { color: var(--pink); }
  .events .section-title { color: #fff; }
  .events .section-desc { color: rgba(255,255,255,.6); }
  .events-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .events-header { margin-bottom: 48px; }
  .events-list { display: grid; gap: 18px; }
  .event-card { background: rgba(255,255,255,.07); border: 2px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 24px 30px; display: flex; align-items: center; gap: 24px; transition: background .2s, border-color .2s, transform .2s; flex-wrap: wrap; }
  .event-card:hover { background: rgba(255,255,255,.11); border-color: var(--yellow); transform: translateX(6px); }
  .event-date { border-radius: 14px; padding: 14px 18px; text-align: center; min-width: 68px; flex-shrink: 0; border: 2.5px solid; }
  .event-card:nth-child(1) .event-date { background: var(--pink-light); border-color: var(--pink-dark); }
  .event-card:nth-child(2) .event-date { background: var(--sky-light); border-color: var(--sky-dark); }
  .event-card:nth-child(3) .event-date { background: var(--mint-light); border-color: var(--mint-dark); }
  .event-card:nth-child(4) .event-date { background: var(--yellow-light); border-color: var(--yellow-dark); }
  .event-date .month { font-size: 0.68rem; font-weight: 900; text-transform: uppercase; letter-spacing: .1em; color: var(--dark); font-family: 'Baloo 2', cursive; }
  .event-date .day { font-family: 'Fredoka One', cursive; font-size: 2.1rem; line-height: 1; color: var(--dark); }
  .event-info { flex: 1; min-width: 180px; }
  .event-info h3 { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: #fff; margin-bottom: 4px; }
  .event-info p { font-size: 0.88rem; color: rgba(255,255,255,.55); font-weight: 600; }
  .event-chip { padding: 7px 18px; border-radius: var(--radius-pill); font-size: 0.82rem; font-weight: 800; font-family: 'Baloo 2', cursive; border: 2px solid; }
  .event-card:nth-child(1) .event-chip { background: var(--pink-light); color: var(--dark); border-color: var(--pink-dark); }
  .event-card:nth-child(2) .event-chip { background: var(--sky-light); color: var(--dark); border-color: var(--sky-dark); }
  .event-card:nth-child(3) .event-chip { background: var(--mint-light); color: var(--dark); border-color: var(--mint-dark); }
  .event-card:nth-child(4) .event-chip { background: var(--yellow-light); color: var(--dark); border-color: var(--yellow-dark); }

  /* ===== DONATE STRIP ===== */
  .donate-strip { background: var(--yellow); color: var(--dark); padding: 90px 5vw; text-align: center; position: relative; overflow: hidden; border-top: 4px solid var(--yellow-dark); border-bottom: 4px solid var(--yellow-dark); }
