<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="800" fill="#f5f5f5"/>
  
  <!-- Decorative elements -->
  <circle cx="430" cy="340" r="15" fill="#e8a9b0"/>
  <circle cx="410" cy="365" r="8" fill="#5b9fd4"/>
  <circle cx="505" cy="335" r="12" fill="#5b9fd4"/>
  <circle cx="580" cy="380" r="8" fill="#e8a9b0"/>
  <circle cx="610" cy="365" r="10" fill="#8dd3a7"/>
  <circle cx="820" cy="395" r="12" fill="#8dd3a7"/>
  <circle cx="455" cy="365" r="18" fill="#5b9fd4"/>
  
  <!-- Gear -->
  <g transform="translate(340, 380)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#8dd3a7" stroke-width="8"/>
    <rect x="-8" y="-38" width="16" height="16" fill="#8dd3a7"/>
    <rect x="-8" y="22" width="16" height="16" fill="#8dd3a7"/>
    <rect x="-38" y="-8" width="16" height="16" fill="#8dd3a7"/>
    <rect x="22" y="-8" width="16" height="16" fill="#8dd3a7"/>
    <circle cx="0" cy="0" r="12" fill="#f5f5f5"/>
  </g>
  
  <!-- Flask -->
  <g transform="translate(450, 380)">
    <!-- Flask neck -->
    <line x1="0" y1="-80" x2="0" y2="-20" stroke="#5b9fd4" stroke-width="12" stroke-linecap="round"/>
    <!-- Flask opening -->
    <rect x="-20" y="-95" width="40" height="20" fill="none" stroke="#5b9fd4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" rx="5"/>
    <!-- Flask body -->
    <path d="M -30 -20 Q -50 0 -45 40 Q -40 70 0 80 Q 40 70 45 40 Q 50 0 30 -20 Z" fill="none" stroke="#5b9fd4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Liquid -->
    <path d="M -28 -18 Q -48 2 -43 38 Q -38 65 0 75 Q 38 65 43 38 Q 48 2 28 -18 Z" fill="#e8a9b0" opacity="0.6"/>
    <!-- Bubbles in flask -->
    <circle cx="-15" cy="10" r="6" fill="#e8a9b0"/>
    <circle cx="0" cy="25" r="5" fill="#e8a9b0"/>
    <circle cx="15" cy="15" r="4" fill="#e8a9b0"/>
  </g>
  
  <!-- Letter S -->
  <text x="180" y="480" font-size="200" font-weight="bold" font-family="Arial, sans-serif" fill="#e8a9b0" letter-spacing="-10">S</text>
  
  <!-- Letter E -->
  <text x="540" y="480" font-size="200" font-weight="bold" font-family="Arial, sans-serif" fill="#5b9fd4" letter-spacing="-10">E</text>
  
  <!-- Letter M -->
  <text x="780" y="480" font-size="200" font-weight="bold" font-family="Arial, sans-serif" fill="#8dd3a7" letter-spacing="-10">M</text>
  
  <!-- Atom -->
  <g transform="translate(695, 350)">
    <circle cx="0" cy="0" r="8" fill="#5b9fd4"/>
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="none" stroke="#8dd3a7" stroke-width="8"/>
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="none" stroke="#8dd3a7" stroke-width="8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="none" stroke="#8dd3a7" stroke-width="8" transform="rotate(120)"/>
  </g>
  
  <!-- Text: Discovery Club -->
  <text x="500" y="620" font-size="80" font-weight="bold" font-family="Arial, sans-serif" fill="#5b9fd4" text-anchor="middle">Discovery</text>
  <text x="650" y="620" font-size="80" font-weight="bold" font-family="Arial, sans-serif" fill="#8dd3a7" text-anchor="start">Club</text>
</svg>